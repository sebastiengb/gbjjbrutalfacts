<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GBJJ Global — Brutal Facts Scoring</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --lightgrey: #ECECEC;
    --midgrey: #C7C7C7;
    --darkgrey: #3A3A3A;
    --charcoal: #1A1A1A;
    --red: #E2231A;
    --white: #ffffff;
    --muted: #8a8a8a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--charcoal);
    background: var(--lightgrey);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }
  h1, h2, h3, .display {
    font-family: 'Archivo', 'Inter', sans-serif;
    font-weight: 900;
    letter-spacing: -0.01em;
    margin: 0;
  }

  /* ---------- BACKGROUND TEXTURE ---------- */
  .bg-blob { position: fixed; border-radius: 50%; filter: blur(2px); z-index: 0; pointer-events: none; }
  .bg-blob.b1 { width: 480px; height: 480px; background: #E2E2E2; top: -180px; left: -160px; }
  .bg-blob.b2 { width: 380px; height: 380px; background: #F5F5F5; bottom: -140px; right: -120px; }
  .bg-blob.b3 { width: 260px; height: 260px; background: rgba(226,35,26,0.05); top: 40%; right: -100px; }

  /* ---------- APP SHELL ---------- */
  .app { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; padding: 22px 20px 60px; min-height: 100vh; display: flex; flex-direction: column; }
  .topbar { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
  .topbar img { width: 40px; height: 40px; flex-shrink: 0; }
  .progress-track { flex: 1; height: 6px; background: var(--midgrey); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--red); border-radius: 4px; transition: width 0.35s ease; width: 0%; }
  .progress-pct { font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 12px; color: var(--darkgrey); flex-shrink: 0; }

  .stage { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; padding: 20px 0; }

  .card {
    background: var(--white); border-radius: 14px; padding: 32px 30px 26px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
  }

  /* ---------- INTRO STEP ---------- */
  .intro-kicker { font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 12px; letter-spacing: 0.16em; color: var(--red); text-transform: uppercase; margin-bottom: 8px; }
  .intro-title { font-size: 30px; line-height: 1.08; text-transform: uppercase; margin-bottom: 14px; }
  .intro-title .accent { color: var(--red); }
  .intro-sub { font-size: 14px; color: var(--darkgrey); line-height: 1.55; margin-bottom: 22px; }
  .howto-rules { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .howto-rule { display: flex; gap: 10px; align-items: flex-start; font-size: 13.5px; line-height: 1.5; }
  .howto-rule .num {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%;
    background: var(--charcoal); color: var(--white); font-family: 'Archivo', sans-serif;
    font-weight: 800; font-size: 12px; display: flex; align-items: center; justify-content: center;
  }
  .key-panel { margin-top: 14px; border-top: 1px solid #eee; padding-top: 16px; }
  .scoring-key { display: flex; flex-direction: column; gap: 16px; }
  .key-card { border: 2px solid var(--charcoal); border-radius: 10px; padding: 16px 16px 12px; }
  .key-card .key-head { display: flex; align-items: center; gap: 9px; font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 14px; margin-bottom: 3px; }
  .key-card .key-head .icon { font-size: 18px; width: 32px; height: 32px; border-radius: 50%; background: var(--charcoal); color: var(--white); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .key-card .key-sub { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
  .key-row { display: flex; gap: 8px; font-size: 11.5px; line-height: 1.4; margin-bottom: 7px; }
  .key-row .num { flex-shrink: 0; width: 18px; height: 18px; border-radius: 50%; background: var(--red); color: white; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; font-family: 'Archivo', sans-serif; }
  .key-row .lbl { font-weight: 700; }

  .name-field label { font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; display: block; margin-bottom: 8px; }
  .name-field input {
    width: 100%; padding: 13px 14px; font-size: 15px; font-family: 'Inter', sans-serif;
    border: 2px solid var(--charcoal); border-radius: 8px; background: var(--white); margin-bottom: 22px;
  }

  /* ---------- SECTION (CATEGORY) PAGE ---------- */
  .cat-chip {
    display: inline-block; background: var(--charcoal); color: var(--white);
    font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 10.5px; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 6px 12px; border-radius: 20px; margin-bottom: 14px;
  }
  .section-title { font-size: 22px; line-height: 1.15; text-transform: none; margin-bottom: 4px; }
  .section-counter { font-size: 11.5px; color: var(--muted); margin-bottom: 14px; font-weight: 600; }
  .step-dots { display: flex; gap: 7px; margin-bottom: 18px; }
  .step-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--midgrey); }
  .step-dot.done { background: var(--darkgrey); }
  .step-dot.current { background: var(--red); transform: scale(1.3); }

  .fact-block { border: 1px solid #e6e6e6; border-radius: 10px; padding: 16px 16px 8px; margin-bottom: 14px; }
  .fact-text-row { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 16px; }
  .fact-icon-badge {
    width: 36px; height: 36px; border-radius: 50%; background: var(--lightgrey);
    display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
  }
  .fact-title { font-size: 14.5px; font-weight: 700; line-height: 1.35; padding-top: 4px; }

  .slider-block { margin-bottom: 16px; }
  .slider-block .row-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
  .slider-block .dim-label {
    font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 11.5px; letter-spacing: 0.05em; text-transform: uppercase;
    display: flex; align-items: center; gap: 5px;
  }
  .slider-block .val { font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 14px; color: var(--red); }
  .slider-block input[type=range] { width: 100%; accent-color: var(--red); height: 6px; }
  .slider-endlabels { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-top: 3px; }
  .live-label {
    text-align: center; font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.03em; color: var(--red);
    margin-bottom: 6px; min-height: 16px;
  }

  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .btn-back {
    font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 13px; color: var(--darkgrey);
    background: none; border: none; cursor: pointer; padding: 10px 4px;
  }
  .btn-back:disabled { opacity: 0.3; cursor: default; }
  .btn-next {
    font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 13.5px; letter-spacing: 0.05em; text-transform: uppercase;
    background: var(--charcoal); color: var(--white); border: none; border-radius: 8px; padding: 14px 26px; cursor: pointer;
  }
  .btn-next:hover { background: var(--red); }
  .btn-next:disabled { background: #b5b5b5; cursor: not-allowed; }

  #statusMsg { margin-top: 14px; font-size: 13px; text-align: center; min-height: 18px; }
  #statusMsg.error { color: var(--red); font-weight: 600; }

  .thankyou-card { text-align: center; padding: 20px 10px; }
  .thankyou-card h2 { font-size: 26px; margin-bottom: 10px; text-transform: uppercase; }
  .thankyou-card p { color: var(--darkgrey); font-size: 14px; }
</style>
</head>

<script>

const CATEGORIES = [
  { category: "Data, Systems & Cybersecurity", facts: [
    { icon: "🗄️", text: "No data strategy — entities operate in disconnected, unmaintained data silos" },
    { icon: "🧾", text: "IT tooling and costs are not centrally tracked" },

  { category: "Governance, Process & Compliance", facts: [
    { icon: "⚖️", text: "No consistent criteria for prioritizing initiatives" },
    { icon: "📊", text: "No shared KPIs to guide direction" },
    { icon: "📋", text: "No compliance strategy in place" },
    { icon: "🧭", text: "Ethics case handling lacks a clear, enforced process" }
  ]},
  { category: "Communication & Meeting Cadence", facts: [
    { icon: "🗓️", text: "No defined meeting cadence connecting Global Board, executives, regional leaders, and school owners" },
    { icon: "🌍", text: "No support to the region" },
    { icon: "💬", text: "Communication channels (WhatsApp, Slack, others) are fragmented and unaligned" },
    { icon: "🔀", text: "Channels are used inconsistently across regions" }
  ]},
  { category: "Brand & Marketing", facts: [

    { icon: "🎬", text: "No storytelling guidelines for global brand platforms (website, Instagram, YouTube)" },
    { icon: "🔑", text: "No clear ownership of brand/social accounts" },
    { icon: "📈", text: "No performance metrics tracked" },
    { icon: "🎨", text: "Regions have no shared brand or content strategy to align around" }
  ]},
  { category: "People & Culture / Org Structure", facts: [
    { icon: "📇", text: "No global staff directory or org chart exists" },
    { icon: "👥", text: "Team members across entities don't know who else is on the team, who joins & who leaves" },
    { icon: "🛡️", text: "Some regions have zero HR resources allocated to Ethics & Safety or Compliance functions" }
  ]}
];

const IMPACT_LABELS = ["Minor annoyance", "Manageable friction", "Real limitation", "Serious risk", "Severe risk"];
const EFFORT_LABELS = ["3+ years", "1–2 years", "Less than a year", "This Quarter", "Quick win, under 90 days"];

const answers = CATEGORIES.map(cat => cat.facts.map(() => ({ impact: 3, effort: 3 })));
let respondentName = "";
let stepIndex = 0; // 0 = intro, 1..CATEGORIES.length = section pages, CATEGORIES.length+1 = thank you
const TOTAL_STEPS = CATEGORIES.length + 2;

const stage = document.getElementById('stage');
const progressFill = document.getElementById('progressFill');
const progressPct = document.getElementById('progressPct');

function updateProgress() {
  const pct = Math.round((stepIndex / (TOTAL_STEPS - 1)) * 100);
  progressFill.style.width = pct + '%';
  progressPct.textContent = pct + '%';
}

function renderIntro() {
  stage.innerHTML = `
    <div class="card">
      <div class="intro-kicker">GBJJ Global Alignment</div>
      <h1 class="intro-title">BRUTAL <span class="accent">FACTS</span> SCORING</h1>
      <div class="intro-sub">Impact × Effort — score it alone, before the room does.</div>
      <div class="howto-rules">
        <div class="howto-rule"><span class="num">1</span><span>Score every Brutal Fact on <strong>Impact</strong> (how much this hurts us if left unresolved) and <strong>Effort</strong> (how much work it realistically takes to fix — size only, not urgency).</span></div>
        <div class="howto-rule"><span class="num">2</span><span>Move every slider, even just to confirm a 3 — that counts as your answer.</span></div>
        <div class="howto-rule"><span class="num">3</span><span>Do this alone, before discussing with anyone else.</span></div>
      </div>
      <div class="key-panel">
        <div class="scoring-key">
          <div class="key-card">
            <div class="key-head"><span class="icon">⚠️</span> Impact</div>
            <div class="key-sub">How much this hurts us if left unresolved</div>
            <div class="key-row"><span class="num">1</span><span><span class="lbl">Minor annoyance</span> — barely noticeable, doesn't affect how we operate.</span></div>
            <div class="key-row"><span class="num">2</span><span><span class="lbl">Manageable friction</span> — creates extra work, but people find workarounds.</span></div>
            <div class="key-row"><span class="num">3</span><span><span class="lbl">Real limitation</span> — meaningfully slows us down or keeps causing the same problem.</span></div>
            <div class="key-row"><span class="num">4</span><span><span class="lbl">Serious risk</span> — actively costing us time, money, or trust right now.</span></div>
            <div class="key-row"><span class="num">5</span><span><span class="lbl">Severe risk</span> — existential or reputational threat if it stays unresolved.</span></div>
          </div>
          <div class="key-card">
            <div class="key-head"><span class="icon">⏱️</span> Effort</div>
            <div class="key-sub">How much work this realistically takes to fix — size only, not urgency</div>
            <div class="key-row"><span class="num">1</span><span><span class="lbl">3+ years</span> — a major structural build needing sustained budget and cross-team work.</span></div>
            <div class="key-row"><span class="num">2</span><span><span class="lbl">1–2 years</span> — a significant build spanning several quarters.</span></div>
            <div class="key-row"><span class="num">3</span><span><span class="lbl">Less than a year</span> — a focused initiative, wrapped up within the year.</span></div>
            <div class="key-row"><span class="num">4</span><span><span class="lbl">This Quarter</span> — doable in 90 days with some outside support.</span></div>
            <div class="key-row"><span class="num">5</span><span><span class="lbl">Quick win, under 90 days</span> — one person can knock this out fast, largely alone.</span></div>
          </div>
        </div>
      </div>
      <div class="name-field" style="margin-top:22px;">
        <label for="respondentName">Your name</label>
        <input type="text" id="respondentName" placeholder="e.g. Sebastien Garnier" value="${respondentName}">
      </div>
      <div class="nav-row" style="justify-content:flex-end;">
        <button class="btn-next" id="startBtn">Start Scoring →</button>
      </div>
      <div id="statusMsg"></div>
    </div>
  `;
  document.getElementById('startBtn').addEventListener('click', () => {
    const name = document.getElementById('respondentName').value.trim();
    if (!name) {
      document.getElementById('statusMsg').textContent = "Please enter your name to start.";
      document.getElementById('statusMsg').className = "error";
      return;
    }
    respondentName = name;
    stepIndex = 1;
    render();
  });
}

function renderSection() {
  const catIndex = stepIndex - 1;
  const cat = CATEGORIES[catIndex];
  const isLast = catIndex === CATEGORIES.length - 1;

  let dots = '';
  for (let i = 0; i < CATEGORIES.length; i++) {
    let cls = 'step-dot';
    if (i < catIndex) cls += ' done';
    if (i === catIndex) cls += ' current';
    dots += `<div class="${cls}"></div>`;
  }

  let factsHtml = '';
  cat.facts.forEach((f, fIndex) => {
    const a = answers[catIndex][fIndex];
    factsHtml += `
      <div class="fact-block">
        <div class="fact-text-row">
          <div class="fact-icon-badge">${f.icon}</div>
          <div class="fact-title">${f.text}</div>
        </div>
        <div class="slider-block">
          <div class="row-head"><span class="dim-label">⚠️ Impact</span><span class="val" id="impactVal-${fIndex}">${a.impact}</span></div>
          <div class="live-label" id="impactLabel-${fIndex}">${IMPACT_LABELS[a.impact - 1]}</div>
          <input type="range" min="1" max="5" step="1" value="${a.impact}" class="impactSlider" data-idx="${fIndex}">
          <div class="slider-endlabels"><span>1 = minor annoyance</span><span>5 = severe risk</span></div>
        </div>
        <div class="slider-block">
          <div class="row-head"><span class="dim-label">⏱️ Effort</span><span class="val" id="effortVal-${fIndex}">${a.effort}</span></div>
          <div class="live-label" id="effortLabel-${fIndex}">${EFFORT_LABELS[a.effort - 1]}</div>
          <input type="range" min="1" max="5" step="1" value="${a.effort}" class="effortSlider" data-idx="${fIndex}">
          <div class="slider-endlabels"><span>1 = 3+ years</span><span>5 = quick win, &lt;90 days</span></div>
        </div>
      </div>
    `;
  });

  stage.innerHTML = `
    <div class="card">
      <div class="cat-chip">Section ${catIndex + 1} of ${CATEGORIES.length}</div>
      <h2 class="section-title">${cat.category}</h2>
      <div class="section-counter">${cat.facts.length} brutal facts to score on this page</div>
      <div class="step-dots">${dots}</div>
      ${factsHtml}
      <div class="nav-row">
        <button class="btn-back" id="backBtn" ${catIndex === 0 ? 'disabled' : ''}>← Back</button>
        <button class="btn-next" id="nextBtn">${isLast ? 'Submit My Scores' : 'Next Section →'}</button>
      </div>
      <div id="statusMsg"></div>
    </div>
  `;

  document.querySelectorAll('.impactSlider').forEach(el => {
    el.addEventListener('input', e => {
      const idx = parseInt(e.target.getAttribute('data-idx'), 10);
      const v = parseInt(e.target.value, 10);
      answers[catIndex][idx].impact = v;
      document.getElementById('impactVal-' + idx).textContent = v;
      document.getElementById('impactLabel-' + idx).textContent = IMPACT_LABELS[v - 1];
    });
  });
  document.querySelectorAll('.effortSlider').forEach(el => {
    el.addEventListener('input', e => {
      const idx = parseInt(e.target.getAttribute('data-idx'), 10);
      const v = parseInt(e.target.value, 10);
      answers[catIndex][idx].effort = v;
      document.getElementById('effortVal-' + idx).textContent = v;
      document.getElementById('effortLabel-' + idx).textContent = EFFORT_LABELS[v - 1];
    });
  });

  const backBtn = document.getElementById('backBtn');
  if (catIndex > 0) {
    backBtn.addEventListener('click', () => { stepIndex -= 1; render(); });
  }

  document.getElementById('nextBtn').addEventListener('click', async () => {
    if (isLast) {
      await submitAll();
    } else {
      stepIndex += 1;
      render();
    }
  });
}

async function submitAll() {
  const nextBtn = document.getElementById('nextBtn');
  const statusMsg = document.getElementById('statusMsg');
  nextBtn.disabled = true;
  statusMsg.textContent = "Submitting...";
  statusMsg.className = "";

  const rows = [];
  CATEGORIES.forEach((cat, ci) => {
    cat.facts.forEach((f, fi) => {
      rows.push({
        respondent_name: respondentName,
        category: cat.category,
        fact: f.text,
        impact: answers[ci][fi].impact,
        effort: answers[ci][fi].effort
      });
    });
  });

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/brutal_facts_scores`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(rows)
    });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(errText || `HTTP ${res.status}`);
    }
    stepIndex = CATEGORIES.length + 1;
    render();
  } catch (err) {
    statusMsg.textContent = "Something went wrong submitting: " + err.message + " — please try again.";
    statusMsg.className = "error";
    nextBtn.disabled = false;
  }
}

function renderThankYou() {
  stage.innerHTML = `
    <div class="card thankyou-card">
      <h2>Thanks — your scores are in.</h2>
      <p>You can close this page now.</p>
    </div>
  `;
}

function render() {
  updateProgress();
  if (stepIndex === 0) renderIntro();
  else if (stepIndex <= CATEGORIES.length) renderSection();
  else renderThankYou();
}

render();
</script>

</body>
</html>
